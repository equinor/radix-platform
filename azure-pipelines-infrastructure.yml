# AKS cluster deploy pipeline

parameters:
- name: source_cluster
  displayName: Source Cluster
  type: string

- name: destination_cluster
  displayName: Destination Cluster
  type: string

trigger:
- master

pool:
  vmImage: 'ubuntu-latest'

stages:
- stage: Deploy
  jobs:
  - job: DeployNewCluster
    steps:
    - task: Bash@3
      displayName: 'Test variables'
      inputs:
        targetType: 'inline'
        script: |
          echo ${{ parameters.source_cluster }}
          echo ${{ parameters.destination_cluster }}
          echo $(testSecret)
          ls
          echo TEST

    - task: AzureCLI@2
      inputs:
        azureSubscription: 'S941-Omnia-Radix-Development(16ede44b-1f74-40a5-b428-46cca9a5741b)'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          - task: AzureCLI@2
            inputs:
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                ls

