# AKS cluster deploy pipeline

parameters:
- name: source_cluster
  displayName: Source Cluster
  type: string

- name: destination_cluster
  displayName: Destination Cluster
  type: string

trigger:
- master

pool:
  vmImage: 'ubuntu-latest'

stages:
- stage: Deploy
  jobs:
  - job: DeployNewCluster
    steps:
    - task: Bash@3
      displayName: 'Test variables'
      inputs:
        targetType: 'inline'
        script: |
          echo ${{ parameters.source_cluster }}
          echo ${{ parameters.destination_cluster }}
          echo $(testSecret)

    - task: Bash@3
      displayName: 'Install prerequisites'
      inputs:
        targetType: 'inline'
        script: |
          sudo apt install apache2-utils
          wget https://github.com/heptio/velero/releases/download/v1.0.0/velero-v1.0.0-linux-amd64.tar.gz
          tar zxvf velero-v1.0.0-linux-amd64.tar.gz
          sudo mv velero-v1.0.0-linux-amd64/velero /usr/bin/
          hash velero 2>/dev/null || { echo >&2 "I require velero but it's not installed. Aborting."; exit 1; }

    - task: AzureCLI@2
      inputs:
        azureSubscription: S941-Omnia-Radix-Development(16ede44b-1f74-40a5-b428-46cca9a5741b)
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          - task: AzureCLI@2
            inputs:
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                az --version
                az account show

