# AKS cluster deploy pipeline

trigger:
- master

pool:
  vmImage: 'ubuntu-latest'

steps:
- script: echo Hello, world!
  displayName: 'Run a one-line script'

- task: Bash@3
  inputs:
    targetType: 'inline'
    script: 'sudo apt install apache2-utils'

- task: Bash@3
  inputs:
    targetType: 'inline'
    script: |
      kubectl version --client=true
      az --version
      helm version --client=true
      python --version
      htpasswd
